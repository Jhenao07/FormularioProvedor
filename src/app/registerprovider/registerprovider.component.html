<div class="provider-page">
  <div class="provider-wrapper">
    <!-- Header oscuro -->
    <div class="provider-header">
      <img src="assets/nuvant.png" alt="Nuvant" />
    </div>
    <!-- Card blanca -->
    <div class="provider-card">
      <div class="icon-circle">
        <img src="assets/favicon.ico" />
      </div>
      <div *ngIf="loadingValidacion" class="spinner-container text-center" style="margin-top: 40px; color: white;">
      <div class="spinner" style="margin: 0 auto 15px;"></div>
      <p>Verificando estado de la orden...</p>
    </div>

    <div *ngIf="ordenValida" class="main-content fade-in">
        <h1>Completa tu registro como proveedor</h1>


        <div class="token-box" (paste)="onPaste($event)" [formGroup]="form">
          <ng-container formArrayName="digits">
            <input
              #otpInput
              *ngFor="let ctrl of digitsFA.controls; let i = index"
              type="text"
              inputmode="numeric"
              maxlength="1"
              [formControlName]="i"
              (input)="onInput($event, i)"
              (keydown)="onKeydown($event, i)"
              [class.error-input]="ctrl.hasError('invalid')"
            />
          </ng-container>
        </div>

            <div class="actions">
              <button type="button" class="btn-primary" (click)="validateToken()">
                Validar e Iniciar
              </button>
            </div>

            <p style="font-size: 0.8em; margin-top: 10px; color: var(--muted);">
              ¿No recibiste el código? <a (click)="requestToken()" style="cursor:pointer; color: blue;">Reenviar</a>
            </p>
          </div>
        

        <div class="info-list">
          <div class="info-item">
            <span class="icon">🔒</span>
            <span>Tu información está segura y confidencial</span>
          </div>
        </div>
      </div>


      <div class="help">
        <p>¿Necesitas ayuda?</p>
        <a href="mailto:proveedores@nuvantglobal.com"> ---- </a>
      </div>
    </div>
    <!-- Footer -->
    <div class="provider-footer">
      Soporte:
      <a href="mailto:proveedores@nuvantglobal.com"> --- </a>
    </div>
  </div>
